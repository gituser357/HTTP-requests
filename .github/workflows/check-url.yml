name: Check file availability

on:
  schedule:
    - cron: '*/10 * * * *'  # Каждые 10 минут
  workflow_dispatch:  # Ручной запуск

jobs:
  check-file:
    runs-on: ubuntu-latest
    concurrency:
      group: file-check
      cancel-in-progress: false
    
    steps:
      - name: Check URL status
        id: check
        env:
          CHECKURL: ${{ vars.CHECKURL }}  # URL из переменных репозитория
        run: |
          if [[ "$CHECKURL" != http://* && "$CHECKURL" != https://* ]]; then
            echo "❌ ОШИБКА: URL должен начинаться с http:// или https://"
            echo "Текущий URL: $CHECKURL"
            exit 1
          fi
          
          echo "🔍 Проверяю: $CHECKURL"
          
          # Получаем HTTP-код
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$CHECKURL")
          
          # Сохраняем код для следующего шага
          echo "code=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Успешно! Код 200"
          else
            echo "❌ Проблема! Код ответа: $HTTP_CODE"
          fi
      
      - name: Send Telegram notification on failure
        if: steps.check.outputs.code != '200'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          CHECKURL: ${{ vars.CHECKURL }}
        run: |
          # Формируем сообщение
          MESSAGE="❌ *Сервис с файлом недоступен!*
          
          • Время: $(TZ='Europe/Moscow' date '+%d.%m.%Y %H:%M:%S')
          • URL: \`${CHECKURL}\`
          • Код ответа: ${{ steps.check.outputs.code }}
          
          🔴 Требуется внимание!"
          
          # Отправляем в Telegram
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="${MESSAGE}" \
            -d parse_mode="Markdown"
          
          echo "📨 Уведомление отправлено в Telegram"