name: Simple file check

on:
  schedule:
    - cron: '*/10 * * * *'  # каждые 10 минут
  workflow_dispatch:  # можно запускать вручную

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check URL
        id: check
        run: |
          # ГАРАНТИРОВАННО РАБОЧИЙ URL (Google)
          URL="https://www.google.com/favicon.ico"
          
          echo "🔍 Проверяю: $URL"
          
          # Получаем HTTP код
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
          
          echo "code=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ ВСЕ ОК! Код 200"
          else
            echo "❌ Ошибка! Код: $HTTP_CODE"
          fi
      
      - name: Send notification if failed
        if: steps.check.outputs.code == '200'
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          # Простое сообщение
          MESSAGE="❌ Тестовый мониторинг упал! Код: ${{ steps.check.outputs.code }}"
          
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d text="${MESSAGE}"